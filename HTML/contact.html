<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>UBarbershop – Contact</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="../css/contact.css" rel="stylesheet" />
    <link href="../css/header_footer.css" rel="stylesheet" />
</head>

<body>

    <!-- Header -->
    <header class="site-header">

        <!-- LEFT SIDE -->
        <div class="header-left">
            <a class="logo" href="home.html">
                <img src="../images/logo.png" alt="UBarbershop Logo" class="logo-img" />
                <span class="logo-text">UBarbershop</span>
            </a>

            <a
                href="appointment.html"
                class="btn primary"
                id="header-appoint-button"
                data-i18n="nav.appointBtn"
            >
                Make an Appointment
            </a>
        </div>

        <!-- CENTER -->
        <nav class="main-nav">
            <a href="home.html" data-i18n="nav.home">Home</a>
            <a href="about.html" data-i18n="nav.about">About</a>
            <a href="contact.html" data-i18n="nav.contact">Contact</a>
        </nav>

        <!-- RIGHT SIDE -->
        <div class="header-actions">
            <a href="login.html" class="btn-login account-link" id="account-link">
                Login
            </a>

            <a
                href="callendar.html"
                class="btn-login admin-tab"
                id="admin-tab"
                data-i18n="nav.adminMode"
                style="display:none;"
            >
                Admin Mode
            </a>

            <div class="lang-switcher">
                <button data-lang="en">EN</button>
                <button data-lang="fr">FR</button>
            </div>
        </div>

    </header>

    <!-- Main -->
    <main class="contact-page">

        <h1 data-i18n="contact.title">Contact Us</h1>

        <div class="contact-card">

            <h2 data-i18n="contact.helpTitle">We're Here to Help</h2>

            <p>
				<strong data-i18n="contact.phoneLabel">Phone:</strong>
				<a href="tel:+14504720174" class="contact-phone-link">
					(450) 472-0174
				</a>
			</p>

            <p>
			<strong data-i18n="contact.addressLabel">Address:</strong><br>
				UBarbershop<br><br>

				<a href="#" class="contact-address-link" onclick="openMaps(event)">
					771A Arthur-Sauvé,<br>
					Saint-Eustache, QC, Canada, J7R 4K3
				</a>
			</p>

            <div class="msg-title">
                <h3 data-i18n="contact.messageTitle">Send Us a Message</h3>
            </div>

            <div class="contact-card-social-icons">
                <a
                    href="https://www.instagram.com/salonubarbershop/"
                    target="_blank"
                    rel="noopener noreferrer"
                    aria-label="Instagram"
                >
                    <img src="../images/instagram.png" alt="Instagram" />
                </a>

                <a
                    href="https://www.facebook.com/p/U-barbershop-100067913270000/"
                    target="_blank"
                    rel="noopener noreferrer"
                    aria-label="Facebook"
                >
                    <img src="../images/facebook.png" alt="Facebook" />
                </a>
            </div>

        </div>

    </main>

    <!-- Footer -->
    <footer class="site-footer">

        <div class="footer-cols">

            <div>
                <h4 data-i18n="footer.contact">Contact</h4>
                <p>
                    <span data-i18n="footer.phoneLabel">Phone:</span>
                    (450) 472-0174
                </p>
            </div>

            <div>
                <h4 data-i18n="footer.follow">Follow Us</h4>

                <div class="social-icons">
                    <a
                        href="https://www.instagram.com/salonubarbershop/"
                        target="_blank"
                        rel="noopener noreferrer"
                        aria-label="Instagram"
                    >
                        <img src="../images/instagram.png" alt="Instagram" />
                    </a>

                    <a
                        href="https://www.facebook.com/p/U-barbershop-100067913270000/"
                        target="_blank"
                        rel="noopener noreferrer"
                        aria-label="Facebook"
                    >
                        <img src="../images/facebook.png" alt="Facebook" />
                    </a>
                </div>
            </div>

        </div>

        <p class="footer-bottom">
            © <script>document.write(new Date().getFullYear())</script> UBarbershop
        </p>

    </footer>

    <!-- Scripts -->
	<script src="../js/app-config.local.js"></script>
    <script src="../js/contact.js" type="module"></script>
    <script src="../js/headerAuth.js" type="module"></script>
    <script src="../js/lang.js"></script>
    <script src="../js/hamburgerMenu.js"></script>
    <script src="../js/activeNav.js"></script>

	<script>
		function openMaps(event) {
			event.preventDefault();

			const address = "771A Arthur-Sauvé, Saint-Eustache, QC, Canada, J7R 4K3";
			const encoded = encodeURIComponent(address);
			const ua = navigator.userAgent || navigator.vendor || window.opera;

			if (/android/i.test(ua)) {
				window.location.href = `geo:0,0?q=${encoded}`;
			} else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
				window.location.href = `http://maps.apple.com/?q=${encoded}`;
			} else {
				window.open(`https://www.google.com/maps/search/?api=1&query=${encoded}`, "_blank");
			}
		}
	</script>
</body>
</html>
