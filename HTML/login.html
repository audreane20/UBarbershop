<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <link href="../css/login.css" rel="stylesheet" />
    <link href="../css/header_footer.css" rel="stylesheet" />
</head>

<body>

    <!-- Header -->
    <header class="site-header">

        <!-- LEFT SIDE -->
        <div class="header-left">
            <a class="logo" href="home.html">
                <img src="../images/logo.png" alt="UBarbershop Logo" class="logo-img" />
                <span class="logo-text">UBarbershop</span>
            </a>

            <a
                href="appointment.html"
                class="btn primary"
                id="header-appoint-button"
                data-i18n="appoint.submit"
            >
                Make an Appointment
            </a>
        </div>

        <!-- CENTER -->
        <nav class="main-nav">
            <a href="home.html" data-i18n="nav.home">Home</a>
            <a href="about.html" data-i18n="nav.about">About</a>
            <a href="contact.html" data-i18n="nav.contact">Contact</a>
        </nav>

        <!-- RIGHT SIDE -->
        <div class="header-actions">
            <a href="login.html" class="btn-login account-link" id="account-link">
                Login
            </a>

            <a
                href="callendar.html"
                class="btn-login admin-tab"
                id="admin-tab"
                data-i18n="nav.adminMode"
                style="display:none;"
            >
                Admin Mode
            </a>

            <div class="lang-switcher">
                <button type="button" data-lang="en">EN</button>
                <button type="button" data-lang="fr">FR</button>
            </div>
        </div>

    </header>

    <!-- Main -->
    <div class="page-container">
        <div class="box">
            <h2 data-i18n="auth.login.title">Login</h2>

            <form id="login-form" novalidate>

                <label for="email" data-i18n="auth.email.label">Email</label>
                <input
                    id="email"
                    type="email"
                    required
                    placeholder="Email"
                    data-i18n-placeholder="auth.email.placeholder"
                />

                <label for="password" data-i18n="auth.password.label">Password</label>
                <input
                    id="password"
                    type="password"
                    required
                    placeholder="Password"
                    data-i18n-placeholder="auth.password.placeholder"
                />

                <button type="submit" class="btn-primary" data-i18n="auth.login.button">
                    Login
                </button>

                <div class="auth-divider">
                    <span data-i18n="auth.or">or</span>
                </div>

                <button type="button" id="google-login" class="oauth-pill">
                    <span class="oauth-icon-wrap" aria-hidden="true">
                        <img src="../images/google_inv.png" alt="" class="oauth-icon" />
                    </span>
                    <span class="oauth-text" data-i18n="auth.oauth.google">
                        Continue with Google
                    </span>
                </button>

                <button type="button" id="facebook-login" class="oauth-pill oauth-facebook">
                    <span class="oauth-icon-wrap" aria-hidden="true">
                        <img src="../images/facebook.png" alt="" class="oauth-icon" />
                    </span>
                    <span class="oauth-text" data-i18n="auth.oauth.facebook">
                        Continue with Facebook
                    </span>
                </button>

                <p class="login-link">
                    <a href="#" id="forgot-password" data-i18n="auth.login.forgot">
                        Forgot password?
                    </a>
                </p>

                <p class="register-link">
                    <span data-i18n="auth.login.noAccount">Don\'t have an account?</span>
                    <a href="register.html" data-i18n="auth.login.registerLink">Register</a>
                </p>

                <p class="error" id="error"></p>

            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="site-footer">

        <div class="footer-cols">

            <div>
                <h4 data-i18n="footer.contact">Contact</h4>
                <p>
                    <span data-i18n="footer.phoneLabel">Phone:</span>
                    (450) 472-0174
                </p>
            </div>

            <div>
                <h4 data-i18n="footer.follow">Follow Us</h4>

                <div class="social-icons">
                    <a
                        href="https://www.instagram.com/salonubarbershop/"
                        target="_blank"
                        rel="noopener noreferrer"
                        aria-label="Instagram"
                    >
                        <img src="../images/instagram.png" alt="Instagram" />
                    </a>

                    <a
                        href="https://www.facebook.com/p/U-barbershop-100067913270000/"
                        target="_blank"
                        rel="noopener noreferrer"
                        aria-label="Facebook"
                    >
                        <img src="../images/facebook.png" alt="Facebook" />
                    </a>
                </div>

            </div>

        </div>

        <p class="footer-bottom">
            © <script>document.write(new Date().getFullYear())</script> UBarbershop
        </p>

    </footer>

    <!-- Scripts -->
    <!-- Scripts -->
	<script src="../js/app-config.local.js"></script>
	<script src="../js/lang.js"></script>
	<script type="module" src="../js/login.js"></script>
	<script type="module" src="../js/headerAuth.js"></script>
	<script src="../js/hamburgerMenu.js"></script>
	<script src="../js/activeNav.js"></script>

</body>
</html>
